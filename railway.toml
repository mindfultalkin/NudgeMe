[build]
builder = "nixpacks"
buildCommand = "cd nudgeme && npm ci && npm run build && cp -r dist ../nudgeme-server/static && cd ../nudgeme-server && pip install -r requirements.txt"

[deploy]
startCommand = "cd nudgeme-server && gunicorn -w 4 --bind=0.0.0.0:$PORT -k uvicorn.workers.UvicornWorker app:app"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10